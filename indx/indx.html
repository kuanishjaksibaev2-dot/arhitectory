<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Luxury Architecture</title>
    <!-- Подключаем стили Tailwind CSS -->
    <script src="https://jsdelivr.net"></script>
    <style>
        /* Включаем плавную фиксацию экранов при скролле */
        html {
            scroll-snap-type: y mandatory;
            scroll-behavior: smooth;
        }
        section {
            scroll-snap-align: start;
        }
    </style>
</head>
<body class="bg-[#f4f1ea] text-[#1a1a1a] font-sans antialiased overflow-x-hidden">

    <!-- ЭКРАН 1: Главный экран с фоновым видео -->
    <section class="relative h-screen w-screen flex items-center justify-center overflow-hidden">
        <!-- Красивое фоновое видео с архитектурой напрямую из сети -->
        <video autoplay muted loop playsinline class="absolute inset-0 w-full h-full object-cover z-0 brightness-75">
            <source src="https://mixkit.co" type="video/mp4">
        </video>
        <!-- Текст поверх видео -->
        <div class="relative z-10 text-center px-4">
            <h1 class="text-white text-5xl md:text-7xl font-extralight tracking-widest uppercase mb-4">
                Claude Studio
            </h1>
            <p class="text-gray-200 text-sm md:text-base tracking-[0.2em] uppercase">
                Иммерсивный архитектурный опыт
            </p>
        </div>
    </section>

    <!-- ЭКРАН 2: Галерея с 3D-эффектом карточек (Vanilla Tilt) -->
    <section class="h-screen w-screen flex flex-col justify-center items-center px-6 md:px-24">
        <h2 class="text-2xl md:text-3xl font-light uppercase tracking-widest mb-12 text-[#2c2a27]">
            Галерея проектов
        </h2>
        
        <div class="grid grid-cols-1 md:grid-cols-2 gap-8 w-full max-w-5xl">
            <!-- Карточка 1 -->
            <div class="tilt-card bg-[#e6e2d8] p-4 rounded shadow-sm border border-[#decbba] cursor-pointer transition-shadow duration-300 hover:shadow-xl relative overflow-hidden group">
                <div class="h-64 overflow-hidden mb-4">
                    <img src="https://unsplash.com" 
                         alt="Project 1" class="w-full h-full object-cover group-hover:scale-105 transition-transform duration-700">
                </div>
                <h3 class="text-lg font-light tracking-wide uppercase">Резиденция Минимализма</h3>
                <p class="text-xs text-gray-500 tracking-wider mt-1">Бетон, Стекло, Свет</p>
            </div>

            <!-- Карточка 2 -->
            <div class="tilt-card bg-[#e6e2d8] p-4 rounded shadow-sm border border-[#decbba] cursor-pointer transition-shadow duration-300 hover:shadow-xl relative overflow-hidden group">
                <div class="h-64 overflow-hidden mb-4">
                    <img src="https://unsplash.com" 
                         alt="Project 2" class="w-full h-full object-cover group-hover:scale-105 transition-transform duration-700">
                </div>
                <h3 class="text-lg font-light tracking-wide uppercase">Интерьер «Теплый Беж»</h3>
                <p class="text-xs text-gray-500 tracking-wider mt-1">Люкс Сдержанность</p>
            </div>
        </div>
    </section>

    <!-- ЭКРАН 3: Интерактивный чертеж (Анимация SVG) -->
    <section class="h-screen w-screen flex flex-col justify-center items-center bg-[#111111] text-[#f4f1ea] px-6">
        <h2 class="text-2xl font-light uppercase tracking-widest mb-8 text-gray-400">
            План пространства
        </h2>
        
        <!-- Простой интерактивный SVG-чертеж -->
        <div class="w-full max-w-md bg-[#1a1a1a] p-8 rounded border border-gray-800">
            <svg id="blueprint" viewBox="0 0 100 100" class="w-full h-auto stroke-amber-100/40 stroke-[0.5] fill-none">
                <!-- Стены дома -->
                <rect x="10" y="10" width="80" height="80" class="animated-path" />
                <line x1="50" y1="10" x2="50" y2="90" class="animated-path" />
                <line x1="10" y1="50" x2="50" y2="50" class="animated-path" />
                <!-- Внутренние двери/арки -->
                <circle cx="50" cy="30" r="8" class="animated-path" />
                <circle cx="30" cy="50" r="5" class="animated-path" />
            </svg>
        </div>
        <p class="text-xs text-gray-500 tracking-widest mt-6 uppercase">Линии прорисовываются при появлении экрана</p>
    </section>

    <!-- СКРИПТЫ ДЛЯ ЭФФЕКТОВ -->
    <script>
        // 1. Простой 3D Эффект наклона карточек (Vanilla Tilt)
        const cards = document.querySelectorAll('.tilt-card');
        
        cards.forEach(card => {
            card.addEventListener('mousemove', (e) => {
                const rect = card.getBoundingClientRect();
                const x = e.clientX - rect.left; // координата X мыши внутри карточки
                const y = e.clientY - rect.top;  // координата Y мыши внутри карточки
                
                const xc = rect.width / 2;
                const yc = rect.height / 2;
                
                // Рассчитываем угол наклона (макс 10 градусов)
                const angleX = (yc - y) / yc * 10;
                const angleY = (x - xc) / xc * 10;
                
                card.style.transform = `perspective(1000px) rotateX(${angleX}deg) rotateY(${angleY}deg)`;
            });
            
            // Возвращаем карточку в исходное положение, когда мышь уходит
            card.addEventListener('mouseleave', () => {
                card.style.transform = 'perspective(1000px) rotateX(0deg) rotateY(0deg)';
                card.style.transition = 'all 0.5s ease';
            });
            
            card.addEventListener('mouseenter', () => {
                card.style.transition = 'none';
            });
        });

        // 2. Анимация SVG линий при скролле (Intersection Observer)
        const svgPaths = document.querySelectorAll('.animated-path');
        
        svgPaths.forEach(path => {
            const length = path.getTotalLength ? path.getTotalLength() : 320; 
            path.style.strokeDasharray = length;
            path.style.strokeDashoffset = length;
        });

        const observer = new IntersectionObserver((entries) => {
            entries.forEach(entry => {
                if (entry.isIntersecting) {
                    const paths = entry.target.querySelectorAll('.animated-path');
                    paths.forEach(path => {
                        path.style.transition = 'stroke-dashoffset 3s ease-in-out';
                        path.style.strokeDashoffset = '0';
                    });
                }
            });
        }, { threshold: 0.3 });

        // Наблюдаем за третьим экраном
        observer.observe(document.querySelector('section:nth-child(3)'));
    </script>
</body>
</html>
