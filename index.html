<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Penthouse Interior &mdash; Panoramic Study</title>

<script src="https://cdn.tailwindcss.com"></script>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>

<style>
  html, body {
    margin: 0;
    padding: 0;
    overflow: hidden;
    width: 100%;
    height: 100%;
    background: #0d0b12;
    font-family: 'Helvetica Neue', Arial, sans-serif;
  }

  #scene-canvas {
    display: block;
    width: 100vw;
    height: 100vh;
    outline: none;
    cursor: grab;
  }

  #scene-canvas:active {
    cursor: grabbing;
  }

  #loading-screen {
    position: fixed;
    inset: 0;
    background: #14101c;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-direction: column;
    z-index: 100;
    transition: opacity 0.9s ease, visibility 0.9s ease;
  }

  #loading-screen.hidden {
    opacity: 0;
    visibility: hidden;
    pointer-events: none;
  }

  .loader-ring {
    width: 34px;
    height: 34px;
    border: 1.5px solid rgba(244, 233, 220, 0.15);
    border-top-color: rgba(244, 233, 220, 0.85);
    border-radius: 50%;
    animation: spin 1s linear infinite;
  }

  @keyframes spin {
    to { transform: rotate(360deg); }
  }

  .glass-card {
    background: rgba(244, 238, 228, 0.08);
    backdrop-filter: blur(14px) saturate(150%);
    -webkit-backdrop-filter: blur(14px) saturate(150%);
    border: 1px solid rgba(244, 238, 228, 0.18);
    box-shadow: 0 8px 32px rgba(0, 0, 0, 0.4), inset 0 1px 0 rgba(255, 255, 255, 0.06);
  }

  .fade-in {
    animation: fadeIn 1.2s ease forwards;
    opacity: 0;
  }

  @keyframes fadeIn {
    to { opacity: 1; }
  }

  .pulse-dot {
    animation: pulseDot 2.4s ease-in-out infinite;
  }

  @keyframes pulseDot {
    0%, 100% { opacity: 0.4; transform: scale(0.85); }
    50% { opacity: 1; transform: scale(1.1); }
  }
</style>
</head>

<body>

<div id="loading-screen">
  <div class="loader-ring"></div>
  <p class="mt-5 text-[11px] tracking-[0.35em] uppercase text-[#f4eee4]/50 font-light">Rendering the Skyline</p>
</div>

<canvas id="scene-canvas"></canvas>

<!-- Top glass instruction card -->
<div class="fixed top-6 left-1/2 -translate-x-1/2 z-20 fade-in" style="animation-delay: 0.6s;">
  <div class="glass-card rounded-full px-6 py-3 flex items-center gap-3">
    <span class="w-1.5 h-1.5 rounded-full bg-[#f4eee4] pulse-dot"></span>
    <span class="text-[#f4eee4] text-xs md:text-sm tracking-[0.15em] uppercase font-light whitespace-nowrap">
      Drag to look around the penthouse
    </span>
  </div>
</div>

<!-- Bottom-left identity card -->
<div class="fixed bottom-6 left-6 z-20 fade-in" style="animation-delay: 0.9s;">
  <div class="glass-card rounded-2xl px-5 py-4 max-w-[230px]">
    <p class="text-[10px] tracking-[0.3em] uppercase text-[#f4eee4]/50 font-light mb-1">Penthouse Study</p>
    <p class="text-[#f4eee4] text-sm font-light leading-snug">The Ridgeline Residence</p>
    <p class="text-[#f4eee4]/40 text-[10px] mt-2 font-light">Concrete, glass &amp; mountain twilight</p>
  </div>
</div>

<!-- Bottom-right compass -->
<div class="fixed bottom-6 right-6 z-20 fade-in" style="animation-delay: 1.1s;">
  <div class="glass-card rounded-full w-14 h-14 flex items-center justify-center">
    <svg id="compass-needle" width="20" height="20" viewBox="0 0 20 20" style="transition: transform 0.15s ease-out;">
      <polygon points="10,1 13,10 10,8 7,10" fill="#e2725b" />
      <polygon points="10,19 13,10 10,12 7,10" fill="#f4eee4" fill-opacity="0.6" />
    </svg>
  </div>
</div>

<script>
  (function () {
    'use strict';

    /* ---------------------------------------------------------
       Core setup
    --------------------------------------------------------- */
    var canvas = document.getElementById('scene-canvas');
    var loadingScreen = document.getElementById('loading-screen');
    var compassNeedle = document.getElementById('compass-needle');

    var ROOM_WIDTH = 40;
    var ROOM_HEIGHT = 14;
    var ROOM_DEPTH = 40;
    var EYE_HEIGHT = 1.8;
    var WINDOW_WALL_Z = -ROOM_DEPTH / 2; // -20, the panoramic long wall

    var scene = new THREE.Scene();
    scene.background = new THREE.Color(0x18131f);

    var camera = new THREE.PerspectiveCamera(
      60,
      window.innerWidth / window.innerHeight,
      0.1,
      500
    );
    camera.position.set(0, EYE_HEIGHT, 6);

    var renderer = new THREE.WebGLRenderer({
      canvas: canvas,
      antialias: true,
      powerPreference: 'high-performance',
    });
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.shadowMap.enabled = true;
    renderer.shadowMap.type = THREE.PCFSoftShadowMap;
    renderer.outputEncoding = THREE.sRGBEncoding;
    renderer.toneMapping = THREE.ACESFilmicToneMapping;
    renderer.toneMappingExposure = 1.1;
    renderer.physicallyCorrectLights = true;

    /* ---------------------------------------------------------
       Orbit controls — a "look around" rig. The target sits a
       short distance in front of the camera, toward the window,
       so the very first frame faces the mountain view.
    --------------------------------------------------------- */
    var controls = new THREE.OrbitControls(camera, renderer.domElement);
    controls.target.set(0, EYE_HEIGHT, camera.position.z - 2.2);
    controls.enableDamping = true;
    controls.dampingFactor = 0.08;
    controls.rotateSpeed = 0.45;
    controls.zoomSpeed = 0.6;
    controls.enablePan = false;
    controls.enableZoom = true;
    controls.minDistance = 0.5;
    controls.maxDistance = 6;
    controls.minPolarAngle = 0.12;
    controls.maxPolarAngle = Math.PI - 0.12;
    controls.update();

    /* ---------------------------------------------------------
       Interior materials — matte plaster / warm concrete
    --------------------------------------------------------- */
    var wallMaterial = new THREE.MeshStandardMaterial({
      color: 0xe9e3d6,
      roughness: 0.92,
      metalness: 0.02,
    });

    var floorMaterial = new THREE.MeshStandardMaterial({
      color: 0x3a332b,
      roughness: 0.55,
      metalness: 0.08,
    });

    var ceilingMaterial = new THREE.MeshStandardMaterial({
      color: 0xf4efe6,
      roughness: 1.0,
      metalness: 0.0,
    });

    var frameMaterial = new THREE.MeshStandardMaterial({
      color: 0x0b0b0d,
      roughness: 0.28,
      metalness: 0.85,
    });

    function addPanel(width, height, depth, material, x, y, z, castShadow, receiveShadow) {
      var geo = new THREE.BoxGeometry(width, height, depth);
      var mesh = new THREE.Mesh(geo, material);
      mesh.position.set(x, y, z);
      mesh.castShadow = castShadow !== false;
      mesh.receiveShadow = receiveShadow !== false;
      scene.add(mesh);
      return mesh;
    }

    /* ---------------------------------------------------------
       Room shell — floor, ceiling, three solid walls. The
       fourth (window) wall is built separately below.
    --------------------------------------------------------- */
    var floor = addPanel(ROOM_WIDTH, 0.2, ROOM_DEPTH, floorMaterial, 0, -0.1, 0, false, true);
    var ceiling = addPanel(ROOM_WIDTH, 0.2, ROOM_DEPTH, ceilingMaterial, 0, ROOM_HEIGHT + 0.1, 0, false, true);

    var leftWall = addPanel(0.2, ROOM_HEIGHT, ROOM_DEPTH, wallMaterial, -ROOM_WIDTH / 2 - 0.1, ROOM_HEIGHT / 2, 0, false, true);
    var rightWall = addPanel(0.2, ROOM_HEIGHT, ROOM_DEPTH, wallMaterial, ROOM_WIDTH / 2 + 0.1, ROOM_HEIGHT / 2, 0, false, true);
    var backWall = addPanel(ROOM_WIDTH, ROOM_HEIGHT, 0.2, wallMaterial, 0, ROOM_HEIGHT / 2, ROOM_DEPTH / 2 + 0.1, false, true);

    /* Skirting trim along the solid walls */
    var trimMaterial = new THREE.MeshStandardMaterial({ color: 0xd6cfbe, roughness: 0.6 });
    addPanel(ROOM_WIDTH - 0.4, 0.12, 0.05, trimMaterial, 0, 0.06, ROOM_DEPTH / 2 - 0.02, false, false);
    addPanel(0.05, 0.12, ROOM_DEPTH - 0.4, trimMaterial, -ROOM_WIDTH / 2 + 0.02, 0.06, 0, false, false);
    addPanel(0.05, 0.12, ROOM_DEPTH - 0.4, trimMaterial, ROOM_WIDTH / 2 - 0.02, 0.06, 0, false, false);

    /* ---------------------------------------------------------
       Panoramic window wall — floor-to-near-ceiling curtain
       glass with a minimalist black steel mullion grid.
    --------------------------------------------------------- */
    var openingWidth = 37;
    var openingBottom = 0.35;
    var openingHeight = 12.4;
    var openingTop = openingBottom + openingHeight;
    var sideWidth = (ROOM_WIDTH - openingWidth) / 2;

    /* Header beam above the glazing */
    addPanel(ROOM_WIDTH, ROOM_HEIGHT - openingTop, 0.3, wallMaterial, 0, (openingTop + ROOM_HEIGHT) / 2, WINDOW_WALL_Z, false, true);
    /* Footer / sill band below the glazing */
    addPanel(ROOM_WIDTH, openingBottom, 0.3, wallMaterial, 0, openingBottom / 2, WINDOW_WALL_Z, false, true);
    /* Side pilasters flanking the glazing */
    addPanel(sideWidth, openingHeight, 0.3, wallMaterial, -(openingWidth / 2 + sideWidth / 2), openingBottom + openingHeight / 2, WINDOW_WALL_Z, false, true);
    addPanel(sideWidth, openingHeight, 0.3, wallMaterial, (openingWidth / 2 + sideWidth / 2), openingBottom + openingHeight / 2, WINDOW_WALL_Z, false, true);

    /* Outer steel frame around the opening */
    addPanel(openingWidth + 0.3, 0.22, 0.28, frameMaterial, 0, openingTop, WINDOW_WALL_Z, false, false);
    addPanel(openingWidth + 0.3, 0.22, 0.28, frameMaterial, 0, openingBottom, WINDOW_WALL_Z, false, false);
    addPanel(0.22, openingHeight + 0.3, 0.28, frameMaterial, -openingWidth / 2, openingBottom + openingHeight / 2, WINDOW_WALL_Z, false, false);
    addPanel(0.22, openingHeight + 0.3, 0.28, frameMaterial, openingWidth / 2, openingBottom + openingHeight / 2, WINDOW_WALL_Z, false, false);

    /* Glass pane spanning the full opening */
    var glassMaterial = new THREE.MeshPhysicalMaterial({
      color: 0xcfe3ee,
      transparent: true,
      opacity: 0.14,
      roughness: 0.04,
      metalness: 0.15,
      side: THREE.DoubleSide,
    });
    var glassGeometry = new THREE.PlaneGeometry(openingWidth, openingHeight);
    var glassPane = new THREE.Mesh(glassGeometry, glassMaterial);
    glassPane.position.set(0, openingBottom + openingHeight / 2, WINDOW_WALL_Z + 0.06);
    scene.add(glassPane);

    /* Vertical mullions */
    var verticalBayCount = 9;
    var verticalSpacing = openingWidth / verticalBayCount;
    for (var v = 1; v < verticalBayCount; v++) {
      var vx = -openingWidth / 2 + verticalSpacing * v;
      addPanel(0.07, openingHeight, 0.14, frameMaterial, vx, openingBottom + openingHeight / 2, WINDOW_WALL_Z + 0.09, false, false);
    }

    /* Horizontal mullions dividing the glazing into three bands */
    var horizontalBandCount = 3;
    var horizontalSpacing = openingHeight / horizontalBandCount;
    for (var h = 1; h < horizontalBandCount; h++) {
      var hy = openingBottom + horizontalSpacing * h;
      addPanel(openingWidth, 0.07, 0.14, frameMaterial, 0, hy, WINDOW_WALL_Z + 0.09, false, false);
    }

    /* ---------------------------------------------------------
       Canvas-generated twilight sky texture
    --------------------------------------------------------- */
    function createSkyTexture() {
      var canvasEl = document.createElement('canvas');
      canvasEl.width = 1024;
      canvasEl.height = 512;
      var ctx = canvasEl.getContext('2d');

      var gradient = ctx.createLinearGradient(0, 0, 0, canvasEl.height);
      gradient.addColorStop(0, '#140a2e');
      gradient.addColorStop(0.28, '#341b4d');
      gradient.addColorStop(0.52, '#6a3862');
      gradient.addColorStop(0.72, '#c45c58');
      gradient.addColorStop(0.86, '#e78a4e');
      gradient.addColorStop(1, '#f7c17a');
      ctx.fillStyle = gradient;
      ctx.fillRect(0, 0, canvasEl.width, canvasEl.height);

      /* Sun glow near the horizon */
      var sunX = canvasEl.width * 0.62;
      var sunY = canvasEl.height * 0.74;
      var glow = ctx.createRadialGradient(sunX, sunY, 0, sunX, sunY, 260);
      glow.addColorStop(0, 'rgba(255, 226, 170, 0.95)');
      glow.addColorStop(0.35, 'rgba(255, 176, 120, 0.5)');
      glow.addColorStop(1, 'rgba(255, 176, 120, 0)');
      ctx.fillStyle = glow;
      ctx.fillRect(0, 0, canvasEl.width, canvasEl.height);

      var sunCore = ctx.createRadialGradient(sunX, sunY, 0, sunX, sunY, 60);
      sunCore.addColorStop(0, 'rgba(255, 244, 220, 0.95)');
      sunCore.addColorStop(1, 'rgba(255, 244, 220, 0)');
      ctx.fillStyle = sunCore;
      ctx.fillRect(0, 0, canvasEl.width, canvasEl.height);

      /* Faint stars in the upper twilight band */
      for (var i = 0; i < 140; i++) {
        var sx = Math.random() * canvasEl.width;
        var sy = Math.random() * canvasEl.height * 0.42;
        var alpha = Math.random() * 0.6;
        ctx.fillStyle = 'rgba(255,255,255,' + alpha.toFixed(2) + ')';
        var size = Math.random() * 1.4;
        ctx.fillRect(sx, sy, size, size);
      }

      /* A few soft horizontal cloud bands */
      for (var c = 0; c < 5; c++) {
        var cy = canvasEl.height * (0.4 + c * 0.07);
        var cGrad = ctx.createLinearGradient(0, cy - 14, 0, cy + 14);
        cGrad.addColorStop(0, 'rgba(255, 200, 170, 0)');
        cGrad.addColorStop(0.5, 'rgba(255, 210, 185, 0.16)');
        cGrad.addColorStop(1, 'rgba(255, 200, 170, 0)');
        ctx.fillStyle = cGrad;
        ctx.fillRect(0, cy - 14, canvasEl.width, 28);
      }

      var texture = new THREE.CanvasTexture(canvasEl);
      texture.encoding = THREE.sRGBEncoding;
      return texture;
    }

    var skyTexture = createSkyTexture();
    var skyMaterial = new THREE.MeshBasicMaterial({ map: skyTexture, fog: false });
    var skyGeometry = new THREE.PlaneGeometry(420, 220);
    var skyMesh = new THREE.Mesh(skyGeometry, skyMaterial);
    skyMesh.position.set(0, 60, -170);
    scene.add(skyMesh);

    /* ---------------------------------------------------------
       Layered mountain silhouettes for atmospheric depth
    --------------------------------------------------------- */
    function buildMountainRange(zPos, baseColor, peakHeight, jaggedness, baseY) {
      var shape = new THREE.Shape();
      var totalWidth = 360;
      var segments = 26;
      var startX = -totalWidth / 2;

      shape.moveTo(startX, baseY - 6);
      shape.lineTo(startX, baseY + peakHeight * 0.25);

      for (var i = 0; i <= segments; i++) {
        var x = startX + (totalWidth / segments) * i;
        var ridge = Math.sin(i * 0.9) * jaggedness + Math.sin(i * 2.3) * (jaggedness * 0.35);
        var y = baseY + peakHeight * 0.4 + Math.abs(ridge) + Math.random() * jaggedness * 0.4;
        shape.lineTo(x, y);
      }

      shape.lineTo(totalWidth / 2, baseY - 6);
      shape.closePath();

      var geometry = new THREE.ShapeGeometry(shape);
      var material = new THREE.MeshBasicMaterial({ color: baseColor, side: THREE.DoubleSide, fog: false });
      var mesh = new THREE.Mesh(geometry, material);
      mesh.position.set(0, 0, zPos);
      scene.add(mesh);
      return mesh;
    }

    buildMountainRange(-95, 0x8d7f92, 22, 3.2, 4);
    buildMountainRange(-72, 0x5c4a68, 26, 4.2, 2);
    buildMountainRange(-50, 0x2c2138, 30, 5.4, 0);

    /* ---------------------------------------------------------
       Interior lighting — ambient wash, two overhead lamps and
       a warm point light suggesting sunset spill near the glass.
    --------------------------------------------------------- */
    var ambientLight = new THREE.AmbientLight(0x726a72, 0.5);
    scene.add(ambientLight);

    var hemiLight = new THREE.HemisphereLight(0xd9c9c2, 0x241f2c, 0.35);
    scene.add(hemiLight);

    function createOverheadLamp(x, z, intensity, color) {
      var group = new THREE.Group();

      var fixtureGeo = new THREE.CylinderGeometry(0.34, 0.42, 0.26, 24);
      var fixtureMat = new THREE.MeshStandardMaterial({
        color: 0x231f1a,
        roughness: 0.4,
        metalness: 0.5,
      });
      var fixture = new THREE.Mesh(fixtureGeo, fixtureMat);
      fixture.position.set(x, ROOM_HEIGHT - 0.35, z);
      fixture.castShadow = true;
      group.add(fixture);

      var bulbGeo = new THREE.SphereGeometry(0.14, 16, 16);
      var bulbMat = new THREE.MeshStandardMaterial({
        color: color,
        emissive: color,
        emissiveIntensity: 1.5,
        roughness: 0.3,
      });
      var bulb = new THREE.Mesh(bulbGeo, bulbMat);
      bulb.position.set(x, ROOM_HEIGHT - 0.56, z);
      group.add(bulb);

      var light = new THREE.PointLight(color, intensity, 24, 2);
      light.position.set(x, ROOM_HEIGHT - 0.56, z);
      light.castShadow = true;
      light.shadow.mapSize.width = 1024;
      light.shadow.mapSize.height = 1024;
      light.shadow.bias = -0.0025;
      light.shadow.camera.near = 0.2;
      light.shadow.camera.far = 26;
      group.add(light);

      scene.add(group);
      return group;
    }

    createOverheadLamp(-9, 6, 9, 0xffe6c4);
    createOverheadLamp(9, 6, 9, 0xffe6c4);

    /* Warm sunset spill just inside the glazing */
    var sunsetSpill = new THREE.PointLight(0xff9a5a, 3.4, 20, 2);
    sunsetSpill.position.set(4, 3.6, WINDOW_WALL_Z + 3);
    scene.add(sunsetSpill);

    var sunsetSpill2 = new THREE.PointLight(0xffb98a, 2.2, 16, 2);
    sunsetSpill2.position.set(-6, 2.4, WINDOW_WALL_Z + 4);
    scene.add(sunsetSpill2);

    /* ---------------------------------------------------------
       Furniture — a lounge composition facing the window
    --------------------------------------------------------- */
    var furnitureGroup = new THREE.Group();

    var fabricMaterial = new THREE.MeshStandardMaterial({ color: 0x8a7c6a, roughness: 0.9 });
    var woodMaterial = new THREE.MeshStandardMaterial({ color: 0x4d3b2c, roughness: 0.5, metalness: 0.05 });
    var metalMaterial = new THREE.MeshStandardMaterial({ color: 0x1f1c19, roughness: 0.3, metalness: 0.75 });
    var stoneMaterial = new THREE.MeshStandardMaterial({ color: 0xcfc7b6, roughness: 0.55, metalness: 0.1 });

    function addFurniture(geometry, material, x, y, z, castShadow, receiveShadow) {
      var mesh = new THREE.Mesh(geometry, material);
      mesh.position.set(x, y, z);
      mesh.castShadow = castShadow !== false;
      mesh.receiveShadow = receiveShadow !== false;
      furnitureGroup.add(mesh);
      return mesh;
    }

    /* Low sofa facing the panoramic view */
    addFurniture(new THREE.BoxGeometry(3.6, 0.55, 1.2), fabricMaterial, 0, 0.28, 1);
    addFurniture(new THREE.BoxGeometry(3.6, 0.75, 0.26), fabricMaterial, 0, 0.75, 1.56);
    addFurniture(new THREE.BoxGeometry(0.26, 0.7, 1.2), fabricMaterial, -1.78, 0.63, 1);
    addFurniture(new THREE.BoxGeometry(0.26, 0.7, 1.2), fabricMaterial, 1.78, 0.63, 1);
    for (var c = 0; c < 3; c++) {
      addFurniture(new THREE.BoxGeometry(1.0, 0.32, 1.0), fabricMaterial, -1.05 + c * 1.05, 0.58, 0.98);
    }

    /* Coffee table */
    addFurniture(new THREE.CylinderGeometry(0.9, 0.9, 0.06, 32), stoneMaterial, 0, 0.42, -1.3);
    var legOffsets = [
      [-0.58, -0.2],
      [0.58, -0.2],
      [-0.58, 0.2],
      [0.58, 0.2],
    ];
    var tableLegGeo = new THREE.CylinderGeometry(0.03, 0.03, 0.38, 12);
    legOffsets.forEach(function (off) {
      addFurniture(tableLegGeo, metalMaterial, off[0], 0.19, -1.3 + off[1]);
    });

    /* Area rug beneath the seating */
    var rugMat = new THREE.MeshStandardMaterial({ color: 0xc7bba5, roughness: 1.0 });
    var rug = new THREE.Mesh(new THREE.CircleGeometry(2.8, 48), rugMat);
    rug.rotation.x = -Math.PI / 2;
    rug.position.set(0, 0.015, 0);
    rug.receiveShadow = true;
    furnitureGroup.add(rug);

    /* Floor lamp beside the sofa */
    addFurniture(new THREE.CylinderGeometry(0.02, 0.02, 1.9, 12), metalMaterial, 3.4, 0.95, 1.6);
    addFurniture(new THREE.ConeGeometry(0.3, 0.42, 24, 1, true), fabricMaterial, 3.4, 1.95, 1.6);
    var lampGlow = new THREE.PointLight(0xffdca8, 1.2, 6, 2);
    lampGlow.position.set(3.4, 1.8, 1.6);
    furnitureGroup.add(lampGlow);
    addFurniture(new THREE.CylinderGeometry(0.25, 0.25, 0.03, 24), metalMaterial, 3.4, 0.02, 1.6);

    /* Sideboard console against the back wall */
    addFurniture(new THREE.BoxGeometry(3.2, 0.7, 0.5), woodMaterial, -9, 0.35, ROOM_DEPTH / 2 - 0.4);
    addFurniture(new THREE.BoxGeometry(2, 1.3, 0.06), woodMaterial, -9, 2.3, ROOM_DEPTH / 2 - 0.12);
    addFurniture(new THREE.BoxGeometry(1.78, 1.08, 0.03), new THREE.MeshStandardMaterial({ color: 0x726556, roughness: 0.85 }), -9, 2.3, ROOM_DEPTH / 2 - 0.16);

    /* Tall potted plant near the glazing corner */
    var potMat = new THREE.MeshStandardMaterial({ color: 0x352f29, roughness: 0.8 });
    addFurniture(new THREE.CylinderGeometry(0.36, 0.29, 0.5, 20), potMat, -16, 0.25, -17);
    var stemMat = new THREE.MeshStandardMaterial({ color: 0x453b2c, roughness: 0.9 });
    var leafMat = new THREE.MeshStandardMaterial({ color: 0x556644, roughness: 0.7 });
    for (var s = 0; s < 5; s++) {
      var stem = addFurniture(
        new THREE.CylinderGeometry(0.015, 0.02, 1.4 + Math.random() * 0.6, 6),
        stemMat,
        -16 + (Math.random() - 0.5) * 0.4,
        1.4,
        -17 + (Math.random() - 0.5) * 0.4
      );
      stem.rotation.z = (Math.random() - 0.5) * 0.35;
      stem.rotation.x = (Math.random() - 0.5) * 0.35;
      addFurniture(
        new THREE.SphereGeometry(0.22, 8, 8),
        leafMat,
        stem.position.x + Math.sin(stem.rotation.z) * 0.6,
        stem.position.y + 0.7,
        stem.position.z + Math.sin(stem.rotation.x) * 0.6
      );
    }

    scene.add(furnitureGroup);

    /* ---------------------------------------------------------
       Window resize handling
    --------------------------------------------------------- */
    function handleResize() {
      var width = window.innerWidth;
      var height = window.innerHeight;
      camera.aspect = width / height;
      camera.updateProjectionMatrix();
      renderer.setSize(width, height);
      renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    }
    window.addEventListener('resize', handleResize);

    /* ---------------------------------------------------------
       Compass needle — reflects camera yaw for a tactile HUD
    --------------------------------------------------------- */
    function updateCompass() {
      var direction = new THREE.Vector3();
      camera.getWorldDirection(direction);
      var angle = Math.atan2(direction.x, direction.z);
      compassNeedle.style.transform = 'rotate(' + (angle * (180 / Math.PI)) + 'deg)';
    }

    /* ---------------------------------------------------------
       Render loop
    --------------------------------------------------------- */
    var clock = new THREE.Clock();

    function animate() {
      requestAnimationFrame(animate);
      var elapsed = clock.getElapsedTime();

      lampGlow.intensity = 1.2 + Math.sin(elapsed * 1.3) * 0.05;
      sunsetSpill.intensity = 3.4 + Math.sin(elapsed * 0.4) * 0.2;

      controls.update();
      updateCompass();
      renderer.render(scene, camera);
    }

    /* ---------------------------------------------------------
       Boot
    --------------------------------------------------------- */
    handleResize();
    animate();

    window.addEventListener('load', function () {
      setTimeout(function () {
        loadingScreen.classList.add('hidden');
      }, 400);
    });

    if (document.readyState === 'complete') {
      setTimeout(function () {
        loadingScreen.classList.add('hidden');
      }, 400);
    }
  })();
</script>

</body>
</html>
