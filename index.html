<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Interior Study &mdash; Immersive Room</title>

<script src="https://cdn.tailwindcss.com"></script>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>

<style>
  html, body {
    margin: 0;
    padding: 0;
    overflow: hidden;
    width: 100%;
    height: 100%;
    background: #111111;
    font-family: 'Helvetica Neue', Arial, sans-serif;
  }

  #scene-canvas {
    display: block;
    width: 100vw;
    height: 100vh;
    outline: none;
    cursor: grab;
  }

  #scene-canvas:active {
    cursor: grabbing;
  }

  #loading-screen {
    position: fixed;
    inset: 0;
    background: #14120f;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-direction: column;
    z-index: 100;
    transition: opacity 0.8s ease, visibility 0.8s ease;
  }

  #loading-screen.hidden {
    opacity: 0;
    visibility: hidden;
    pointer-events: none;
  }

  .loader-ring {
    width: 34px;
    height: 34px;
    border: 1.5px solid rgba(244, 241, 234, 0.15);
    border-top-color: rgba(244, 241, 234, 0.85);
    border-radius: 50%;
    animation: spin 1s linear infinite;
  }

  @keyframes spin {
    to { transform: rotate(360deg); }
  }

  .glass-card {
    background: rgba(244, 241, 234, 0.08);
    backdrop-filter: blur(14px) saturate(140%);
    -webkit-backdrop-filter: blur(14px) saturate(140%);
    border: 1px solid rgba(244, 241, 234, 0.18);
    box-shadow: 0 8px 32px rgba(0, 0, 0, 0.35), inset 0 1px 0 rgba(255, 255, 255, 0.05);
  }

  .fade-in {
    animation: fadeIn 1.2s ease forwards;
    opacity: 0;
  }

  @keyframes fadeIn {
    to { opacity: 1; }
  }

  .pulse-dot {
    animation: pulseDot 2.4s ease-in-out infinite;
  }

  @keyframes pulseDot {
    0%, 100% { opacity: 0.4; transform: scale(0.85); }
    50% { opacity: 1; transform: scale(1.1); }
  }
</style>
</head>

<body>

<div id="loading-screen">
  <div class="loader-ring"></div>
  <p class="mt-5 text-[11px] tracking-[0.35em] uppercase text-[#f4f1ea]/50 font-light">Preparing Space</p>
</div>

<canvas id="scene-canvas"></canvas>

<!-- Top glass instruction card -->
<div class="fixed top-6 left-1/2 -translate-x-1/2 z-20 fade-in" style="animation-delay: 0.6s;">
  <div class="glass-card rounded-full px-6 py-3 flex items-center gap-3">
    <span class="w-1.5 h-1.5 rounded-full bg-[#f4f1ea] pulse-dot"></span>
    <span class="text-[#f4f1ea] text-xs md:text-sm tracking-[0.15em] uppercase font-light whitespace-nowrap">
      Drag to look around &middot; Scroll to zoom
    </span>
  </div>
</div>

<!-- Bottom-left identity card -->
<div class="fixed bottom-6 left-6 z-20 fade-in" style="animation-delay: 0.9s;">
  <div class="glass-card rounded-2xl px-5 py-4 max-w-[220px]">
    <p class="text-[10px] tracking-[0.3em] uppercase text-[#f4f1ea]/50 font-light mb-1">Interior Study</p>
    <p class="text-[#f4f1ea] text-sm font-light leading-snug">Living Room, No. 04</p>
    <p class="text-[#f4f1ea]/40 text-[10px] mt-2 font-light">Concrete &amp; warm plaster</p>
  </div>
</div>

<!-- Bottom-right compass -->
<div class="fixed bottom-6 right-6 z-20 fade-in" style="animation-delay: 1.1s;">
  <div class="glass-card rounded-full w-14 h-14 flex items-center justify-center">
    <svg id="compass-needle" width="20" height="20" viewBox="0 0 20 20" style="transition: transform 0.15s ease-out;">
      <polygon points="10,1 13,10 10,8 7,10" fill="#e2725b" />
      <polygon points="10,19 13,10 10,12 7,10" fill="#f4f1ea" fill-opacity="0.6" />
    </svg>
  </div>
</div>

<script>
  (function () {
    'use strict';

    /* ---------------------------------------------------------
       Core setup
    --------------------------------------------------------- */
    var canvas = document.getElementById('scene-canvas');
    var loadingScreen = document.getElementById('loading-screen');
    var compassNeedle = document.getElementById('compass-needle');

    var ROOM_WIDTH = 30;
    var ROOM_HEIGHT = 12;
    var ROOM_DEPTH = 30;
    var EYE_HEIGHT = 1.6;

    var scene = new THREE.Scene();
    scene.background = new THREE.Color(0x1c1a17);
    scene.fog = new THREE.Fog(0x1c1a17, 14, 34);

    var camera = new THREE.PerspectiveCamera(
      62,
      window.innerWidth / window.innerHeight,
      0.1,
      200
    );
    camera.position.set(0, EYE_HEIGHT, 4);

    var renderer = new THREE.WebGLRenderer({
      canvas: canvas,
      antialias: true,
      powerPreference: 'high-performance',
    });
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.shadowMap.enabled = true;
    renderer.shadowMap.type = THREE.PCFSoftShadowMap;
    renderer.outputEncoding = THREE.sRGBEncoding;
    renderer.toneMapping = THREE.ACESFilmicToneMapping;
    renderer.toneMappingExposure = 1.05;
    renderer.physicallyCorrectLights = true;

    /* ---------------------------------------------------------
       Orbit controls — configured as a "look around" rig.
       Target sits just in front of the camera so dragging
       orbits almost in place (a first-person look), while a
       tight zoom range only lets the user push in slightly.
    --------------------------------------------------------- */
    var controls = new THREE.OrbitControls(camera, renderer.domElement);
    controls.target.set(0, EYE_HEIGHT, 0);
    controls.enableDamping = true;
    controls.dampingFactor = 0.08;
    controls.rotateSpeed = 0.45;
    controls.zoomSpeed = 0.6;
    controls.enablePan = false;
    controls.enableZoom = true;
    controls.minDistance = 0.5;
    controls.maxDistance = 6;
    controls.minPolarAngle = 0.15;
    controls.maxPolarAngle = Math.PI - 0.15;
    controls.update();

    /* ---------------------------------------------------------
       Materials — matte plaster / concrete palette
    --------------------------------------------------------- */
    var wallColor = 0xe6e2d8;
    var floorColor = 0x36302a;
    var ceilingColor = 0xf4f1ea;
    var trimColor = 0xd8d2c4;

    var wallMaterial = new THREE.MeshStandardMaterial({
      color: wallColor,
      roughness: 0.95,
      metalness: 0.02,
    });

    var floorMaterial = new THREE.MeshStandardMaterial({
      color: floorColor,
      roughness: 0.75,
      metalness: 0.05,
    });

    var ceilingMaterial = new THREE.MeshStandardMaterial({
      color: ceilingColor,
      roughness: 1.0,
      metalness: 0.0,
    });

    /* ---------------------------------------------------------
       Room shell — large inverted box, camera lives inside it
    --------------------------------------------------------- */
    var roomGeometry = new THREE.BoxGeometry(ROOM_WIDTH, ROOM_HEIGHT, ROOM_DEPTH);

    var roomMaterials = [
      wallMaterial, // +x  right wall
      wallMaterial, // -x  left wall
      ceilingMaterial, // +y ceiling
      floorMaterial, // -y floor
      wallMaterial, // +z  near wall (behind camera start)
      wallMaterial, // -z  far wall
    ];

    roomMaterials.forEach(function (mat) {
      mat.side = THREE.BackSide;
    });

    var room = new THREE.Mesh(roomGeometry, roomMaterials);
    room.receiveShadow = true;
    scene.add(room);

    /* Subtle skirting / trim line where the far wall meets the floor */
    var trimGeometry = new THREE.BoxGeometry(ROOM_WIDTH - 0.2, 0.14, 0.06);
    var trimMaterial = new THREE.MeshStandardMaterial({
      color: trimColor,
      roughness: 0.6,
    });
    var trimFar = new THREE.Mesh(trimGeometry, trimMaterial);
    trimFar.position.set(0, 0.07, -ROOM_DEPTH / 2 + 0.03);
    scene.add(trimFar);

    var trimNear = trimFar.clone();
    trimNear.position.set(0, 0.07, ROOM_DEPTH / 2 - 0.03);
    scene.add(trimNear);

    var trimSideGeometry = new THREE.BoxGeometry(0.06, 0.14, ROOM_DEPTH - 0.2);
    var trimLeft = new THREE.Mesh(trimSideGeometry, trimMaterial);
    trimLeft.position.set(-ROOM_WIDTH / 2 + 0.03, 0.07, 0);
    scene.add(trimLeft);

    var trimRight = trimLeft.clone();
    trimRight.position.set(ROOM_WIDTH / 2 - 0.03, 0.07, 0);
    scene.add(trimRight);

    /* ---------------------------------------------------------
       Lighting — ambient wash + two warm overhead architectural
       lamps that cast soft, believable shadows.
    --------------------------------------------------------- */
    var ambientLight = new THREE.AmbientLight(0x6a6458, 0.55);
    scene.add(ambientLight);

    var hemiLight = new THREE.HemisphereLight(0xf4f1ea, 0x2a241d, 0.35);
    scene.add(hemiLight);

    function createOverheadLamp(x, z, intensity, color) {
      var group = new THREE.Group();

      var fixtureGeo = new THREE.CylinderGeometry(0.32, 0.4, 0.28, 24);
      var fixtureMat = new THREE.MeshStandardMaterial({
        color: 0x2a2620,
        roughness: 0.4,
        metalness: 0.4,
      });
      var fixture = new THREE.Mesh(fixtureGeo, fixtureMat);
      fixture.position.set(x, ROOM_HEIGHT - 0.35, z);
      fixture.castShadow = true;
      group.add(fixture);

      var bulbGeo = new THREE.SphereGeometry(0.14, 16, 16);
      var bulbMat = new THREE.MeshStandardMaterial({
        color: color,
        emissive: color,
        emissiveIntensity: 1.4,
        roughness: 0.3,
      });
      var bulb = new THREE.Mesh(bulbGeo, bulbMat);
      bulb.position.set(x, ROOM_HEIGHT - 0.55, z);
      group.add(bulb);

      var light = new THREE.PointLight(color, intensity, 22, 2);
      light.position.set(x, ROOM_HEIGHT - 0.55, z);
      light.castShadow = true;
      light.shadow.mapSize.width = 1024;
      light.shadow.mapSize.height = 1024;
      light.shadow.bias = -0.0025;
      light.shadow.camera.near = 0.2;
      light.shadow.camera.far = 24;
      group.add(light);

      scene.add(group);
      return group;
    }

    createOverheadLamp(-4.5, -5, 9.5, 0xffe3bd);
    createOverheadLamp(4.5, 3, 9.5, 0xffe3bd);

    /* A gentle spotlight to define the seating area and add depth */
    var spot = new THREE.SpotLight(0xfff0da, 6, 18, Math.PI / 6, 0.5, 1.2);
    spot.position.set(-2.5, ROOM_HEIGHT - 0.6, -2);
    spot.target.position.set(-1.5, 0, -3);
    spot.castShadow = true;
    spot.shadow.mapSize.width = 1024;
    spot.shadow.mapSize.height = 1024;
    spot.shadow.bias = -0.003;
    scene.add(spot);
    scene.add(spot.target);

    /* ---------------------------------------------------------
       Furniture — grounds the space so scale reads immediately
    --------------------------------------------------------- */
    var furnitureGroup = new THREE.Group();

    var fabricMaterial = new THREE.MeshStandardMaterial({
      color: 0x8a7c6a,
      roughness: 0.9,
      metalness: 0.0,
    });

    var woodMaterial = new THREE.MeshStandardMaterial({
      color: 0x5b4636,
      roughness: 0.55,
      metalness: 0.05,
    });

    var metalMaterial = new THREE.MeshStandardMaterial({
      color: 0x2c2a26,
      roughness: 0.35,
      metalness: 0.7,
    });

    var stoneMaterial = new THREE.MeshStandardMaterial({
      color: 0xcfc8b8,
      roughness: 0.6,
      metalness: 0.1,
    });

    function addMesh(geometry, material, x, y, z, castShadow, receiveShadow) {
      var mesh = new THREE.Mesh(geometry, material);
      mesh.position.set(x, y, z);
      mesh.castShadow = castShadow !== false;
      mesh.receiveShadow = receiveShadow !== false;
      furnitureGroup.add(mesh);
      return mesh;
    }

    /* Low sofa */
    var sofaBase = addMesh(new THREE.BoxGeometry(3.4, 0.55, 1.2), fabricMaterial, -3, 0.28, -3.5);
    var sofaBack = addMesh(new THREE.BoxGeometry(3.4, 0.75, 0.28), fabricMaterial, -3, 0.75, -4.04);
    var sofaArmL = addMesh(new THREE.BoxGeometry(0.28, 0.7, 1.2), fabricMaterial, -4.56, 0.63, -3.5);
    var sofaArmR = addMesh(new THREE.BoxGeometry(0.28, 0.7, 1.2), fabricMaterial, -1.44, 0.63, -3.5);
    for (var c = 0; c < 3; c++) {
      addMesh(
        new THREE.BoxGeometry(0.85, 0.34, 1.02),
        fabricMaterial,
        -4.1 + c * 1.1,
        0.58,
        -3.5
      );
    }

    /* Coffee table */
    var tableTop = addMesh(new THREE.CylinderGeometry(0.85, 0.85, 0.06, 32), stoneMaterial, -3, 0.42, -1.6);
    var tableLegGeo = new THREE.CylinderGeometry(0.03, 0.03, 0.38, 12);
    var legOffsets = [
      [-0.55, -0.2],
      [0.55, -0.2],
      [-0.55, 0.2],
      [0.55, 0.2],
    ];
    legOffsets.forEach(function (off) {
      addMesh(tableLegGeo, metalMaterial, -3 + off[0], 0.19, -1.6 + off[1]);
    });

    /* Floor lamp beside sofa */
    addMesh(new THREE.CylinderGeometry(0.02, 0.02, 1.9, 12), metalMaterial, -5.1, 0.95, -4.6);
    var lampShade = addMesh(new THREE.ConeGeometry(0.3, 0.42, 24, 1, true), fabricMaterial, -5.1, 1.95, -4.6);
    var lampGlow = new THREE.PointLight(0xffdca8, 1.4, 6, 2);
    lampGlow.position.set(-5.1, 1.8, -4.6);
    furnitureGroup.add(lampGlow);
    addMesh(new THREE.CylinderGeometry(0.25, 0.25, 0.03, 24), metalMaterial, -5.1, 0.02, -4.6);

    /* Area rug */
    var rugGeo = new THREE.CircleGeometry(2.6, 48);
    var rugMat = new THREE.MeshStandardMaterial({
      color: 0xc7b9a3,
      roughness: 1.0,
    });
    var rug = new THREE.Mesh(rugGeo, rugMat);
    rug.rotation.x = -Math.PI / 2;
    rug.position.set(-3, 0.015, -2.6);
    rug.receiveShadow = true;
    furnitureGroup.add(rug);

    /* Console + wall art on the far wall */
    addMesh(new THREE.BoxGeometry(3, 0.7, 0.5), woodMaterial, 4.5, 0.35, -ROOM_DEPTH / 2 + 0.4);
    var frameOuter = addMesh(new THREE.BoxGeometry(2, 1.3, 0.06), woodMaterial, 4.5, 2.4, -ROOM_DEPTH / 2 + 0.12);
    var frameInner = addMesh(new THREE.BoxGeometry(1.78, 1.08, 0.03), new THREE.MeshStandardMaterial({
      color: 0x726556,
      roughness: 0.85,
    }), 4.5, 2.4, -ROOM_DEPTH / 2 + 0.16);

    /* A second, smaller framed piece */
    addMesh(new THREE.BoxGeometry(1.1, 1.5, 0.05), woodMaterial, 2.1, 2.1, -ROOM_DEPTH / 2 + 0.11);
    addMesh(new THREE.BoxGeometry(0.92, 1.32, 0.03), new THREE.MeshStandardMaterial({
      color: 0x9c8d78,
      roughness: 0.9,
    }), 2.1, 2.1, -ROOM_DEPTH / 2 + 0.15);

    /* Dining-style bench near the right wall for scale variety */
    addMesh(new THREE.BoxGeometry(0.5, 0.5, 1.8), woodMaterial, ROOM_WIDTH / 2 - 1.2, 0.25, 3);
    addMesh(new THREE.BoxGeometry(0.06, 0.5, 0.06), metalMaterial, ROOM_WIDTH / 2 - 1.4, 0.25, 2.2);
    addMesh(new THREE.BoxGeometry(0.06, 0.5, 0.06), metalMaterial, ROOM_WIDTH / 2 - 1.0, 0.25, 2.2);
    addMesh(new THREE.BoxGeometry(0.06, 0.5, 0.06), metalMaterial, ROOM_WIDTH / 2 - 1.4, 0.25, 3.8);
    addMesh(new THREE.BoxGeometry(0.06, 0.5, 0.06), metalMaterial, ROOM_WIDTH / 2 - 1.0, 0.25, 3.8);

    /* Tall potted plant for organic contrast */
    var potGeo = new THREE.CylinderGeometry(0.35, 0.28, 0.5, 20);
    var potMat = new THREE.MeshStandardMaterial({ color: 0x3f3a33, roughness: 0.8 });
    addMesh(potGeo, potMat, 6.5, 0.25, -6.5);
    var stemMat = new THREE.MeshStandardMaterial({ color: 0x4a4030, roughness: 0.9 });
    for (var s = 0; s < 5; s++) {
      var stem = addMesh(
        new THREE.CylinderGeometry(0.015, 0.02, 1.4 + Math.random() * 0.6, 6),
        stemMat,
        6.5 + (Math.random() - 0.5) * 0.4,
        1.4,
        -6.5 + (Math.random() - 0.5) * 0.4
      );
      stem.rotation.z = (Math.random() - 0.5) * 0.35;
      stem.rotation.x = (Math.random() - 0.5) * 0.35;
      var leafMat = new THREE.MeshStandardMaterial({ color: 0x5a6b4a, roughness: 0.7 });
      addMesh(
        new THREE.SphereGeometry(0.22, 8, 8),
        leafMat,
        stem.position.x + Math.sin(stem.rotation.z) * 0.6,
        stem.position.y + 0.7,
        stem.position.z + Math.sin(stem.rotation.x) * 0.6
      );
    }

    scene.add(furnitureGroup);

    /* ---------------------------------------------------------
       Window resize handling
    --------------------------------------------------------- */
    function handleResize() {
      var width = window.innerWidth;
      var height = window.innerHeight;
      camera.aspect = width / height;
      camera.updateProjectionMatrix();
      renderer.setSize(width, height);
      renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    }
    window.addEventListener('resize', handleResize);

    /* ---------------------------------------------------------
       Compass needle — reflects camera yaw for a tactile HUD
    --------------------------------------------------------- */
    function updateCompass() {
      var direction = new THREE.Vector3();
      camera.getWorldDirection(direction);
      var angle = Math.atan2(direction.x, direction.z);
      compassNeedle.style.transform = 'rotate(' + (angle * (180 / Math.PI)) + 'deg)';
    }

    /* ---------------------------------------------------------
       Render loop
    --------------------------------------------------------- */
    var clock = new THREE.Clock();

    function animate() {
      requestAnimationFrame(animate);
      var elapsed = clock.getElapsedTime();

      /* Gentle flicker-free breathing on the lamp glow for subtle life */
      lampGlow.intensity = 1.4 + Math.sin(elapsed * 1.3) * 0.06;

      controls.update();
      updateCompass();
      renderer.render(scene, camera);
    }

    /* ---------------------------------------------------------
       Boot
    --------------------------------------------------------- */
    handleResize();
    animate();

    window.addEventListener('load', function () {
      setTimeout(function () {
        loadingScreen.classList.add('hidden');
      }, 400);
    });

    /* Fallback in case 'load' already fired before listener attached */
    if (document.readyState === 'complete') {
      setTimeout(function () {
        loadingScreen.classList.add('hidden');
      }, 400);
    }
  })();
</script>

</body>
</html>
